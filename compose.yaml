services:
  airtag-tracker:
    build: .
    devices:
      - /dev/kvm:/dev/kvm
    ports:
      - "8042:8042"
      - "6901:6901"   # noVNC
    volumes:
      - ${AIRTAG_DATA_DIR:-airtag-data}:/data
      - ./server/static:/app/server/static:ro
      - /tmp:/tmp     # QMP/monitor sockets survive container restarts
    environment:
      AIRTAG_VM_ENABLED: "1"
      AIRTAG_DATA_DIR: /data
      AIRTAG_VM_DIR: /data/osx-kvm
      AIRTAG_MACOS_VERSION: "14"
    restart: unless-stopped
