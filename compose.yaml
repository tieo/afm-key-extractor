name: afm-key-extractor
services:
  airtag-tracker:
    build: .
    devices:
      - /dev/kvm:/dev/kvm
    ports:
      - "8042:8042"
      - "6901:6901"   # noVNC
    volumes:
      - airtag-data:/data
      - ./server/static:/app/server/static:ro
      # Bind the Python package so code edits are picked up by a container
      # restart (no image rebuild needed).  Read-only so the container can't
      # corrupt the host tree.
      - ./server/airtag_tracker:/app/server/airtag_tracker:ro
      - /tmp:/tmp     # QMP/monitor sockets survive container restarts
    # Optional secrets file — copy .env.example to .env and fill in your Apple ID.
    # Fields left out here can be entered manually in the browser UI instead.
    env_file:
      - path: .env
        required: false
    environment:
      AIRTAG_VM_ENABLED: "1"
      AIRTAG_DATA_DIR: /data
      AIRTAG_VM_DIR: /data/osx-kvm
      AIRTAG_ASSETS_DIR: /app/assets
      AIRTAG_MACOS_VERSION: "13"
      # Engine takes a snapshot on first entry to each listed state, so
      # subsequent SA-8 iteration can restore via /api/debug/restore in
      # seconds instead of replaying ~45 min of install.
      AIRTAG_AUTO_SNAPSHOT_STATES: "sa_create_account"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8042/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  airtag-data:

